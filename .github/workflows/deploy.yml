name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: turin-genius
  APP_PORT: "3003"
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  REGISTRY_NAMESPACE: chmjk67
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            docker pull ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest

            docker stop $(docker ps -q --filter 'publish=3003') 2>/dev/null || true
            docker rm -f ${{ env.APP_NAME }} Turin-genius turin-genius 2>/dev/null || true

            docker run -d               --name ${{ env.APP_NAME }}               --restart always               -p ${{ env.APP_PORT }}:80               --network caddy-net               -e GH_PAT_TOKEN=${{ secrets.GH_PAT_TOKEN }}               -e LLM_API_URL=${{ secrets.LLM_API_URL }}               -e LLM_API_KEY=${{ secrets.LLM_API_KEY }}               -e LLM_MODEL=${{ secrets.LLM_MODEL }}               ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest

            docker image prune -f
