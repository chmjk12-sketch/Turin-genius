<script>
// ====== SHA256 ======
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ====== Config ======
const PASSWORD_HASH = 'dd003154473a285796f2a912d90bd485d4a4e7adf8879ee60893511bacceef60';
const GITHUB_OWNER = 'chmjk12-sketch';
const GITHUB_REPO = 'Turin-genius';

const LS_AUTH_KEY = 'agent_store_admin_auth';
const LS_TOKEN_KEY = 'agent_store_github_token';

function getToken() {
  let token = localStorage.getItem(LS_TOKEN_KEY);
  if (!token) {
    token = prompt('请输入 GitHub Token：\n（首次使用需要，存储在此浏览器中）');
    if (token) localStorage.setItem(LS_TOKEN_KEY, token);
  }
  return token;
}

function clearToken() {
  localStorage.removeItem(LS_TOKEN_KEY);
  alert('Token 已清除，下次操作时会重新提示输入。');
}

// ====== Auth ======
let authenticated = localStorage.getItem(LS_AUTH_KEY) === 'true';

async function handleLogin() {
  const pw = document.getElementById('password-input').value;
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem(LS_AUTH_KEY, 'true');
    authenticated = true;
    showAdmin();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('password-input').value = '';
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ====== Admin Init ======
if (authenticated) showAdmin();

// ====== Data ======
let agents = [];
let allCategories = [];
let currentFilter = '__all';
let editingId = null;

async function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  await loadAgents();
  renderFilters();
  renderAgents();
}

async function loadAgents() {
  // Try direct fetch first (works in dev and when public/agents.json exists)
  try {
    const r = await fetch('/agents.json');
    if (r.ok) {
      const data = await r.json();
      agents = data.agents;
      extractCategories();
      updateCount();
      return;
    }
  } catch(e) { /* fallback */ }

  // Fallback: read from GitHub API (needs token)
  try {
    const token = getToken();
    if (!token) {
      agents = [];
      addLog('ℹ️ 点击「🚀 发布到线上」时首次需输入 GitHub Token');
      extractCategories();
      updateCount();
      return;
    }
    const r = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/src/data/agents.json`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('Failed to load from GitHub');
    const data = await r.json();
    const text = atob(data.content);
    agents = JSON.parse(text).agents;
  } catch(e) {
    addLog('⚠️ 加载 agents 失败，将使用空数据: ' + e.message);
    agents = [];
  }
  extractCategories();
  updateCount();
}

function extractCategories() {
  const cats = new Set();
  agents.forEach(a => cats.add(a.category));
  allCategories = ['全部', ...Array.from(cats)];
}

function updateCount() {
  document.getElementById('agent-count').textContent = filteredAgents().length + '/' + agents.length + ' 个 Agent';
}

function filteredAgents() {
  return currentFilter === '__all' ? agents : agents.filter(a => a.category === currentFilter);
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '<div class="filter-chip active" data-cat="__all" onclick="setFilter(\'__all\')">全部</div>';
  allCategories.filter(c => c !== '全部').forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (currentFilter === cat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => setFilter(cat);
    el.appendChild(chip);
  });
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.filter-chip[data-cat="${cat}"]`)?.classList.add('active');
  if (cat === '__all') {
    document.querySelector('.filter-chip:first-child')?.classList.add('active');
  }
  renderAgents();
}

function renderAgents() {
  const el = document.getElementById('agent-list');
  const list = filteredAgents();
  el.innerHTML = '';
  list.forEach((agent, idx) => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.draggable = true;
    card.dataset.id = agent.id;

    // Drag handle
    const drag = document.createElement('div');
    drag.className = 'drag-handle';
    drag.textContent = '⠿';

    // Icon
    const icon = document.createElement('div');
    icon.className = 'icon-display';
    const isEmoji = !agent.icon.startsWith('http') && !agent.icon.startsWith('/');
    icon.style.background = isEmoji ? `linear-gradient(135deg, ${agent.iconBg?.replace('from-','').split(' ')[0] || '#333'}, ${agent.iconBg?.split(' ')[1] || '#222'})` : 'var(--bg3)';
    icon.textContent = isEmoji ? agent.icon : '🤖';

    // Info
    const info = document.createElement('div');
    info.className = 'info';
    const nameRow = document.createElement('div');
    nameRow.className = 'name-row';
    nameRow.innerHTML = `
      <span class="name">${agent.name}</span>
      <span class="tag">${agent.category}</span>
      ${agent.featured ? '<span class="tag featured">推荐</span>' : ''}
      ${agent.embedSupported === false ? '<span class="tag" style="background:rgba(248,113,113,0.15);color:var(--danger);">仅外链</span>' : ''}
    `;
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = agent.description;
    const url = document.createElement('div');
    url.className = 'url';
    url.textContent = agent.externalUrl;

    info.appendChild(nameRow);
    info.appendChild(desc);
    info.appendChild(url);

    // Actions
    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="moveAgent('${agent.id}', -1)" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
      <button class="btn btn-ghost btn-sm" onclick="moveAgent('${agent.id}', 1)" ${idx === list.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
      <button class="btn btn-ghost btn-sm" onclick="openEditModal('${agent.id}')">编辑</button>
      <button class="btn btn-danger btn-sm" onclick="deleteAgent('${agent.id}')">下架</button>
    `;

    card.appendChild(drag);
    card.appendChild(icon);
    card.appendChild(info);
    card.appendChild(actions);

    // Drag events
    card.addEventListener('dragstart', () => card.classList.add('dragging'));
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => { e.preventDefault(); swapCards(card); });

    el.appendChild(card);
  });
}

function swapCards(draggedOver) {
  const list = document.getElementById('agent-list');
  const dragging = list.querySelector('.dragging');
  if (!dragging || dragging === draggedOver) return;

  const filterList = filteredAgents();
  const fromId = dragging.dataset.id;
  const toId = draggedOver.dataset.id;
  const fromIdx = agents.findIndex(a => a.id === fromId);
  const toIdx = agents.findIndex(a => a.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;

  // Swap in full agents array
  [agents[fromIdx], agents[toIdx]] = [agents[toIdx], agents[fromIdx]];
  renderAgents();
  addLog(`↕️ 交换位置: ${agents[fromIdx].name} ↔ ${agents[toIdx].name}`);
}

function moveAgent(id, dir) {
  const filterList = filteredAgents();
  const filterIdx = filterList.findIndex(a => a.id === id);
  if (filterIdx === -1) return;
  const newFilterIdx = filterIdx + dir;
  if (newFilterIdx < 0 || newFilterIdx >= filterList.length) return;

  const fullIdx = agents.findIndex(a => a.id === id);
  const fullTargetIdx = agents.findIndex(a => a.id === filterList[newFilterIdx].id);
  if (fullIdx === -1 || fullTargetIdx === -1) return;

  [agents[fullIdx], agents[fullTargetIdx]] = [agents[fullTargetIdx], agents[fullIdx]];
  addLog(`↕️ 移动: ${agents[fullIdx].name}`);
  renderAgents();
}

function deleteAgent(id) {
  const agent = agents.find(a => a.id === id);
  if (!agent) return;
  if (!confirm(`确认下架「${agent.name}」？`)) return;
  agents = agents.filter(a => a.id !== id);
  extractCategories();
  renderFilters();
  renderAgents();
  updateCount();
  addLog(`🗑️ 下架: ${agent.name}`);
}

// ====== Modal ======
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '➕ 新增 Agent';
  document.getElementById('modal-save-btn').textContent = '添加';
  clearForm();
  document.getElementById('modal-overlay').classList.add('show');
}

function openEditModal(id) {
  const agent = agents.find(a => a.id === id);
  if (!agent) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '✏️ 编辑 Agent';
  document.getElementById('modal-save-btn').textContent = '保存';
  document.getElementById('f-name').value = agent.name || '';
  document.getElementById('f-desc').value = agent.description || '';
  document.getElementById('f-icon').value = agent.icon || '';
  document.getElementById('f-iconBg').value = agent.iconBg || '';
  document.getElementById('f-externalUrl').value = agent.externalUrl || '';
  document.getElementById('f-embedUrl').value = agent.embedUrl || '';
  document.getElementById('f-featured').checked = !!agent.featured;
  document.getElementById('f-embedSupported').checked = agent.embedSupported !== false;
  
  // Populate categories
  const sel = document.getElementById('f-category');
  sel.innerHTML = '';
  allCategories.filter(c => c !== '全部').forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    if (cat === agent.category) opt.selected = true;
    sel.appendChild(opt);
  });
  document.getElementById('f-category-new').value = '';

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function clearForm() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-icon').value = '';
  document.getElementById('f-iconBg').value = '';
  document.getElementById('f-externalUrl').value = '';
  document.getElementById('f-embedUrl').value = '';
  document.getElementById('f-featured').checked = false;
  document.getElementById('f-embedSupported').checked = true;
  const sel = document.getElementById('f-category');
  sel.innerHTML = '';
  allCategories.filter(c => c !== '全部').forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    sel.appendChild(opt);
  });
  document.getElementById('f-category-new').value = '';
}

function saveAgent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('请输入名称'); return; }

  const category = document.getElementById('f-category-new').value.trim() || 
                    document.getElementById('f-category').value;

  const data = {
    id: editingId || name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-').replace(/^-|-$/g, ''),
    name,
    description: document.getElementById('f-desc').value.trim(),
    icon: document.getElementById('f-icon').value.trim() || '🤖',
    iconBg: document.getElementById('f-iconBg').value.trim() || 'from-neutral-600 to-neutral-800',
    category,
    externalUrl: document.getElementById('f-externalUrl').value.trim(),
    embedUrl: document.getElementById('f-embedUrl').value.trim() || document.getElementById('f-externalUrl').value.trim(),
    lastUpdated: new Date().toISOString().split('T')[0],
    featured: document.getElementById('f-featured').checked || undefined,
    embedSupported: document.getElementById('f-embedSupported').checked || undefined,
  };

  if (editingId) {
    const idx = agents.findIndex(a => a.id === editingId);
    if (idx !== -1) {
      // Preserve id
      data.id = editingId;
      agents[idx] = data;
      addLog(`✏️ 编辑: ${data.name}`);
    }
  } else {
    // Ensure unique id
    if (agents.some(a => a.id === data.id)) {
      data.id = data.id + '-' + Date.now().toString(36);
    }
    agents.push(data);
    addLog(`➕ 上架: ${data.name}`);
  }

  extractCategories();
  renderFilters();
  renderAgents();
  updateCount();
  closeModal();
}

// ====== Publish ======
async function publishChanges() {
  if (!confirm('确认将当前修改发布到线上？')) return;

  const statusEl = document.getElementById('publish-status');
  const logEl = document.getElementById('log-list');
  logEl.classList.add('show');

  function setStatus(type, msg) {
    statusEl.className = 'publish-status show ' + type;
    statusEl.textContent = msg;
    addLog('[' + type + '] ' + msg);
  }

  setStatus('loading', '⏳ 准备发布...');

  try {
    const token = getToken();
    if (!token) {
      setStatus('error', '❌ 需要 GitHub Token 才能发布');
      return;
    }
    setStatus('loading', '🔑 Token 已获取');

    const content = JSON.stringify({ agents }, null, 2);
    const base64 = btoa(unescape(encodeURIComponent(content)));
    setStatus('loading', '📦 数据已序列化 (' + agents.length + ' 个 Agent)');

    const files = ['src/data/agents.json', 'public/agents.json'];
    for (const filePath of files) {
      setStatus('loading', '⏳ 获取 ' + filePath + ' 的 SHA...');
      const r1 = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!r1.ok) throw new Error('无法获取 ' + filePath + ' 信息: ' + r1.status);
      const fileInfo = await r1.json();

      setStatus('loading', '🚀 推送 ' + filePath + '...');
      const r2 = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'feat: admin panel update agents',
          content: base64,
          sha: fileInfo.sha,
        })
      });
      if (!r2.ok) throw new Error('推送 ' + filePath + ' 失败: ' + r2.status);
      setStatus('loading', '✅ 已推送: ' + filePath);
    }

    setStatus('success', '✅ 已推送到 GitHub，部署约 2-3 分钟生效');

    // Poll for deployment
    await pollDeploy(token, setStatus);

  } catch(e) {
    setStatus('error', '❌ 发布失败: ' + (e.message || e));
  }
}

async function pollDeploy(token, setStatus) {
  setStatus('loading', '⏳ 等待部署完成...');
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 10000));
    try {
      const r = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/runs?per_page=1`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      const data = await r.json();
      const run = data.workflow_runs?.[0];
      if (run?.status === 'completed') {
        if (run.conclusion === 'success') {
          setStatus('success', '✅ 部署成功！请刷新 Agent Store 页面查看效果');
        } else {
          setStatus('error', '⚠️ 推送成功，但部署 ' + run.conclusion);
        }
        return;
      }
      setStatus('loading', '⏳ 部署中 (' + ((i+1)*10) + 's / 200s)...');
    } catch(e) {
      setStatus('loading', '⏳ 检查部署状态失败，继续等待...');
    }
  }
  setStatus('success', '✅ 已推送，部署可能还在进行中，请稍后刷新页面查看');
}

// ====== Utils ======
function addLog(msg) {
  const el = document.getElementById('log-list');
  el.classList.add('show');
  const item = document.createElement('div');
  item.className = 'log-item';
  const time = new Date().toLocaleTimeString();
  item.textContent = `[${time}] ${msg}`;
  el.appendChild(item);
  el.scrollTop = el.scrollHeight;
}

// Load on init if authenticated
if (authenticated) {
  showAdmin();
}
</script>
